<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/6a42eb7020.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" class="iconImg" href="https://m.media-amazon.com/images/I/71O7MLhe8AL.jpg" type="image/icon type">
    <link rel="shorcut icon" href="#"><!--If you dont wanna see 404 error in browser console-->
    <title>Shelby Brothers</title>
    <style> 
    
    </style>
</head>
<body>
    <div class="menuContainer">
        <img class="image" src="https://ih1.redbubble.net/image.3033639759.3645/st,small,507x507-pad,600x600,f8f8f8.jpg">
        <h2 class="title">Shelby Brothers Muisc Player</h2>
    </div>
    <div class="container">
        <div class="playlistContainer"></div>
        <audio src="" class="audioTag">
            Your browser does not support the audio element
        </audio>
        <div class="progressbarContainer">
            <div class="currentAndTotalTime">00:00 / 00:00</div>
            <div id="progressBar">
                <div id="currentProgress">Hi</div>
            </div>
            <div>
                <div class="musicPlayer">
                    <i class="fas fa-step-backward controls previousButton"></i>
                    <i class="fas fa-play-circle controls playButton"></i>
                    <i class="fas fa-pause-circle controls pauseButton"></i>
                    <i class="fas fa-step-forward controls nextButton"></i>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
